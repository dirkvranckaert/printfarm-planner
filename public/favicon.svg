<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Paper feed (top, going into printer) -->
  <rect x="22" y="8" width="20" height="14" rx="3" fill="#f1f5f9"/>
  <!-- Paper edge line to give depth -->
  <rect x="22" y="19" width="20" height="2" fill="#cbd5e1"/>

  <!-- Printer body -->
  <rect x="10" y="20" width="44" height="22" rx="5" fill="#334155"/>

  <!-- Printer top slot (paper entry) -->
  <rect x="21" y="20" width="22" height="3" rx="1" fill="#1e293b"/>

  <!-- Vents on printer body -->
  <rect x="14" y="27" width="8" height="2" rx="1" fill="#1e293b" opacity="0.6"/>
  <rect x="14" y="31" width="8" height="2" rx="1" fill="#1e293b" opacity="0.6"/>
  <rect x="14" y="35" width="5" height="2" rx="1" fill="#1e293b" opacity="0.6"/>

  <!-- Status light -->
  <circle cx="47" cy="27" r="3" fill="#22c55e"/>
  <circle cx="47" cy="27" r="1.5" fill="#86efac"/>

  <!-- Second indicator -->
  <circle cx="40" cy="27" r="2" fill="#475569"/>

  <!-- Paper output slot -->
  <rect x="21" y="39" width="22" height="3" rx="1" fill="#1e293b"/>

  <!-- Paper coming out (green = printed!) -->
  <rect x="22" y="41" width="20" height="15" rx="3" fill="#22c55e"/>
  <!-- Lines on paper suggesting print content -->
  <rect x="26" y="46" width="12" height="2" rx="1" fill="#15803d"/>
  <rect x="26" y="50" width="8"  height="2" rx="1" fill="#15803d"/>
</svg>
